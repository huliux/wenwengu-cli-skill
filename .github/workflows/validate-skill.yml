name: Validate Skill Bundle

on:
  push:
  pull_request:

jobs:
  validate-structure:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate skill bundle structure
        run: |
          python - <<'PY'
          from pathlib import Path

          root = Path.cwd()
          required_files = [
              root / "SKILL.md",
              root / "README.md",
              root / "agents" / "openai.yaml",
              root / "scripts" / "run_valuation.py",
              root / "scripts" / "install_engine.py",
              root / "references" / "engine_install.md",
              root / "references" / "valuation_parameters.md",
              root / "templates" / "request" / "base_request.json",
          ]

          missing = [str(path) for path in required_files if not path.exists()]
          if missing:
              raise SystemExit("Missing required publishable skill files:\n" + "\n".join(missing))

          pycache_dirs = [str(path) for path in root.rglob("__pycache__")]
          pyc_files = [str(path) for path in root.rglob("*.pyc")]
          if pycache_dirs or pyc_files:
              lines = ["Skill bundle must not include Python cache artifacts."]
              if pycache_dirs:
                  lines.append("Found __pycache__ dirs:")
                  lines.extend(pycache_dirs)
              if pyc_files:
                  lines.append("Found .pyc files:")
                  lines.extend(pyc_files)
              raise SystemExit("\n".join(lines))

          frontmatter = (root / "SKILL.md").read_text(encoding="utf-8")
          if 'name: wenwengu-cli' not in frontmatter:
              raise SystemExit("SKILL.md frontmatter does not declare the expected skill name.")
          if "huliux/wenwengu-cli-skill" not in frontmatter:
              raise SystemExit("SKILL.md is not pointing at the public release repository.")
          PY

      - name: Audit docs for machine-specific paths
        run: |
          python - <<'PY'
          from pathlib import Path

          root = Path.cwd()
          forbidden = [
              "~/.codex/",
              "~/.openclaw/",
              "/Users/",
              "/tmp/",
              "python ~/.",
          ]

          text_files = []
          for path in list(root.rglob("*.md")) + list(root.rglob("*.yaml")) + list(root.rglob("*.yml")):
              if ".github" in path.parts and "workflows" in path.parts:
                  continue
              text_files.append(path)
          violations = []
          for path in text_files:
              content = path.read_text(encoding="utf-8")
              for needle in forbidden:
                  if needle in content:
                      violations.append(f"{path}: contains forbidden path pattern {needle!r}")

          if violations:
              raise SystemExit("Machine-specific path audit failed:\n" + "\n".join(violations))
          PY
